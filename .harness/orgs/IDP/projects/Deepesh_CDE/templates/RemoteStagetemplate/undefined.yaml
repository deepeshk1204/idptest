template:
  name: RemoteStagetemplate
  identifier: RemoteStagetemplate
  type: Stage
  projectIdentifier: Deepesh_CDE
  orgIdentifier: IDP
  tags: {}
  spec:
    type: Custom
    spec:
      execution:
        steps:
          - step:
              type: ShellScript
              name: ShellScript_1
              identifier: ShellScript_1
              spec:
                shell: Bash
                executionTarget: {}
                source:
                  type: Inline
                  spec:
                    script: |-
                      echo 'hello'

                      echo <+stage.variables.demo>
                environmentVariables: []
                outputVariables: []
              timeout: 10m
    variables:
      - name: demo
        type: String
        description: ""
        required: false
        value: <+input>
  versionLabel: "2"
