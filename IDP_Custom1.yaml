template:
  name: IDP Custom
  identifier: IDP_Custom
  versionLabel: "1"
  type: Stage
  tags: {}
  spec:
    type: Custom
    spec:
      execution:
        steps:
          - step:
              type: ShellScript
              name: ShellScript_1
              identifier: ShellScript_1
              spec:
                shell: Bash
                executionTarget: {}
                source:
                  type: Inline
                  spec:
                    script: echo 'Hello Stage'
                environmentVariables: []
                outputVariables: []
              timeout: 10m
          - step:
              type: ShellScript
              name: ShellScript_2
              identifier: ShellScript_2
              spec:
                shell: Bash
                executionTarget: {}
                source:
                  type: Inline
                  spec:
                    script: echo <+stage.variables.data>
                environmentVariables: []
                outputVariables: []
              timeout: 10m
    variables:
      - name: data
        type: String
        description: ""
        required: false
        value: <+input>
